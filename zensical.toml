# ──────────────────────────────────────────────
# Edit these lines for your project
# ──────────────────────────────────────────────
[project]
name = "navi-SAD"
site_name = "navi-SAD"
description = "Spectral Attention Divergence — dynamical systems probe for LLM inference"
site_url = "https://project-navi.github.io/navi-SAD"
repo_url = "https://github.com/Project-Navi/navi-SAD"
repo_name = "Project-Navi/navi-SAD"
copyright = "Copyright 2026 Project Navi LLC"
extra_css = ["stylesheets/navi.css", "stylesheets/print.css"]
extra_javascript = [
    "javascripts/mathjax.js",
    "https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js",
]

# ──────────────────────────────────────────────
# Edit nav to match your docs structure
# ──────────────────────────────────────────────
nav = [
  {"Home" = "index.md"},
  {"Getting Started" = [
    {"Installation" = "getting-started/installation.md"},
    {"Running the Gates" = "getting-started/running-the-gates.md"},
  ]},
  {"Theory" = [
    {"The SAD Instrument" = "theory/sad-instrument.md"},
    {"Takens' Embedding & Attractor Recon." = "theory/takens-embedding.md"},
    {"Capacity Gap (Han et al.)" = "theory/capacity-gap.md"},
    {"Adjacent Literature" = "theory/adjacent-literature.md"},
  ]},
  {"Instrument" = [
    {"Gate Discipline" = "instrument/gate-discipline.md"},
    {"Gate 0 — Non-interference" = "instrument/gate-0.md"},
    {"Gate 1 — Parity" = "instrument/gate-1.md"},
    {"Gate 2 — Stability" = "instrument/gate-2.md"},
    {"Adapter Discipline" = "instrument/adapter-discipline.md"},
  ]},
  {"Research" = [
    {"Pilot Findings" = "research/pilot-findings.md"},
    {"Roadmap" = "research/roadmap.md"},
    {"Open Problems" = "research/open-problems.md"},
    {"Three-Repo Unification" = "research/three-repo-unification.md"},
  ]},
  {"How-To" = [
    {"Contributing" = "how-to/contributing.md"},
  ]},
  {"Reference" = [
    {"Module Reference" = "reference/module-reference.md"},
    {"Frozen Decisions" = "reference/frozen-decisions.md"},
    {"Glossary" = "reference/glossary.md"},
    {"Changelog" = "reference/changelog.md"},
  ]},
]

# ──────────────────────────────────────────────
# Everything below is shared brand config
# You should not need to change these
# ──────────────────────────────────────────────
[project.theme]
logo = "assets/logo.png"
favicon = "assets/favicon.png"

[project.theme.palette]
scheme = "slate"

[project.theme.features]
navigation_sections = true
navigation_expand = true
navigation_top = true
content_code_copy = true
toc_integrate = true

[project.markdown_extensions.admonition]
[project.markdown_extensions.tables]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
[project.markdown_extensions.pymdownx.arithmatex]
generic = true
[project.plugins.search]
