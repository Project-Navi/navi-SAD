# Pre-commit hooks — mirrors CI lint-typecheck job exactly.
# Install: uv run pre-commit install
# Run manually: uv run pre-commit run --all-files

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check src/ tests/
        language: system
        pass_filenames: false
        types: [python]

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format --check src/ tests/
        language: system
        pass_filenames: false
        types: [python]

      - id: mypy
        name: mypy
        entry: uv run mypy src/
        language: system
        pass_filenames: false
        types: [python]
